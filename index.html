<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jeremy Myung</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="projects.js" defer></script>
  <script src="about.js" defer></script>
  <script src="photos.js" defer></script>
  <script src="theme.js" defer></script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <div class="nav-brand">
        <div class="nav-avatar" id="hero-photo-wrap" style="display: none">
          <img id="hero-photo" alt="Jeremy Myung">
        </div>
        <div class="nav-name">JEREMY MYUNG</div>
      </div>
      <div class="nav-links">
        <a href="#work">projects</a>
        <a href="#photo">photo</a>
        <a href="#sound">music</a>
        <a href="#about">about</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
    </div>
  </nav>

  <!-- WORK -->
  <section id="work" class="section">
    <div class="section-header">
      <h2>Projects</h2>
    </div>
    <div class="project-list" id="project-list">
      <span class="mono" style="color: var(--dim); font-size: 13px;">// loading projects…</span>
    </div>
  </section>

  <!-- PHOTO -->
  <section id="photo" class="section">
    <div class="section-header">
      <h2>Photography</h2>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
  </section>

  <!-- SOUND -->
  <section id="sound" class="section">
    <div class="section-header">
      <h2>Sound &amp; music</h2>
    </div>
    <div class="sound-placeholder">
      <span class="mono">// work in progress — coming soon</span>
    </div>
  </section>

  <!-- ABOUT / FOOTER -->
  <div id="about" class="about-wrap">
    <div class="about-grid">
      <div class="about-text">
        <span class="mono about-label">about</span>
        <p id="about-bio"></p>
      </div>
      <div class="about-links" id="about-links">
        <a href="mailto:hello@jeremymyung.com" class="mono contact-email" id="about-email">hello@jeremymyung.com</a>
        <a href="#" class="mono contact-link">github ↗</a>
        <a href="#" class="mono contact-link">are.na ↗</a>
      </div>
    </div>
    <footer>
      <span>© 2026 jeremy myung</span>
    </footer>
  </div>

</body>
</html>
