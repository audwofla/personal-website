<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard — Jeremy Myung</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dash-body">

  <!-- GATE: shown until the correct password is entered -->
  <section id="gate" class="dash-gate">
    <div class="dash-gate-box">
      <div class="mono dash-gate-label" id="gate-label">// enter password</div>
      <form id="gate-form">
        <input type="password" id="gate-password" class="dash-input" autocomplete="current-password" placeholder="password" autofocus>
        <input type="password" id="gate-password-confirm" class="dash-input" autocomplete="new-password" placeholder="confirm password" style="display:none">
        <button type="submit" class="dash-btn dash-btn-primary">Unlock</button>
      </form>
      <div class="mono dash-gate-error" id="gate-error"></div>
      <button type="button" class="mono dash-link-btn" id="gate-reset">forgot / reset password</button>
    </div>
  </section>

  <!-- DASHBOARD: shown once unlocked -->
  <div id="dashboard" class="dash-wrap" style="display:none">
    <nav class="dash-nav">
      <div class="nav-name">JEREMY MYUNG <span class="mono dash-nav-tag">/ dashboard</span></div>
      <div class="nav-links">
        <a href="index.html">← back to site</a>
        <button type="button" class="mono dash-link-btn" id="lock-btn">lock</button>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">dark</button>
      </div>
    </nav>

    <main class="dash-main">
      <section class="dash-panel">
        <div class="section-header">
          <span class="mono section-num">gh</span>
          <h2>GitHub connection</h2>
        </div>
        <div class="dash-field-row">
          <label class="mono dash-label">owner/repo</label>
          <input type="text" id="cfg-repo" class="dash-input" placeholder="audwofla/personal-website">
        </div>
        <div class="dash-field-row">
          <label class="mono dash-label">branch</label>
          <input type="text" id="cfg-branch" class="dash-input" placeholder="main">
        </div>
        <div class="dash-field-row">
          <label class="mono dash-label">token</label>
          <input type="text" id="cfg-token" class="dash-input" placeholder="github personal access token (repo scope)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-1p-ignore data-bwignore="true">
        </div>
        <div class="dash-field-row">
          <label class="mono dash-checkbox-label">
            <input type="checkbox" id="cfg-remember" checked>
            <span>remember on this device</span>
          </label>
        </div>
      </section>

      <div class="dash-tabs" role="tablist">
        <button type="button" class="dash-tab" data-tab="projects">01 — projects</button>
        <button type="button" class="dash-tab" data-tab="photos">02 — photography</button>
        <button type="button" class="dash-tab" data-tab="about">04 — about</button>
        <button type="button" class="dash-tab" data-tab="resume">cv — resume</button>
      </div>

      <section class="dash-panel" id="panel-projects" data-tab-panel="projects">
        <div class="section-header">
          <span class="mono section-num">01</span>
          <h2>Projects</h2>
        </div>
        <div id="project-editor" class="dash-editor"></div>
        <div class="dash-actions">
          <button type="button" class="dash-btn" id="load-projects-btn">Load projects</button>
          <button type="button" class="dash-btn" id="add-btn">+ add project</button>
          <button type="button" class="dash-btn dash-btn-primary" id="save-btn" disabled>Save &amp; publish</button>
        </div>
        <div class="mono dash-status" id="status"></div>
        <div class="mono dash-status" id="save-status"></div>
      </section>

      <section class="dash-panel" id="panel-photos" data-tab-panel="photos" hidden>
        <div class="section-header">
          <span class="mono section-num">02</span>
          <h2>Photography</h2>
        </div>
        <input type="file" id="photo-file-input" accept="image/*" multiple style="display:none">
        <div id="photo-editor" class="dash-editor"></div>
        <div class="dash-actions">
          <button type="button" class="dash-btn" id="load-photos-btn">Load photos</button>
          <button type="button" class="dash-btn" id="add-photos-btn">+ add photos</button>
          <button type="button" class="dash-btn dash-btn-primary" id="save-photos-btn" disabled>Save &amp; publish</button>
        </div>
        <div class="mono dash-status" id="photos-status"></div>
      </section>

      <section class="dash-panel" id="panel-about" data-tab-panel="about" hidden>
        <div class="section-header">
          <span class="mono section-num">04</span>
          <h2>About</h2>
        </div>
        <div class="dash-field-row" style="align-items: flex-start">
          <label class="mono dash-label">hero photo</label>
          <div class="dash-hero-photo">
            <img id="hero-photo-thumb" class="dash-photo-thumb" alt="" style="display: none">
            <input type="file" id="hero-photo-input" accept="image/*" style="display:none">
            <button type="button" class="dash-btn" id="choose-hero-photo-btn">Choose photo</button>
          </div>
        </div>
        <div class="dash-field-row">
          <label class="mono dash-label">hero role</label>
          <input type="text" id="hero-role-input" class="dash-input" placeholder="// software engineer &amp; creative">
        </div>
        <div class="dash-field-row" style="align-items: flex-start">
          <label class="mono dash-label">hero bio</label>
          <textarea id="hero-bio-input" class="dash-input dash-textarea" placeholder="short bio shown at the top of the page"></textarea>
        </div>
        <div class="dash-field-row" style="align-items: flex-start">
          <label class="mono dash-label">about bio</label>
          <textarea id="about-bio" class="dash-input dash-textarea" placeholder="short bio shown in the about section"></textarea>
        </div>
        <div class="dash-field-row">
          <label class="mono dash-label">email</label>
          <input type="email" id="about-email" class="dash-input" placeholder="hello@example.com">
        </div>

        <div class="mono dash-label dash-subheading">links</div>
        <div id="link-editor" class="dash-editor"></div>

        <div class="dash-actions">
          <button type="button" class="dash-btn" id="load-about-btn">Load about</button>
          <button type="button" class="dash-btn" id="add-link-btn">+ add link</button>
          <button type="button" class="dash-btn dash-btn-primary" id="save-about-btn" disabled>Save &amp; publish</button>
        </div>
        <div class="mono dash-status" id="about-status"></div>
      </section>

      <section class="dash-panel" id="panel-resume" data-tab-panel="resume" hidden>
        <div class="section-header">
          <span class="mono section-num">cv</span>
          <h2>Resume</h2>
        </div>
        <div class="dash-field-row">
          <label class="mono dash-label">file</label>
          <div class="dash-resume-row">
            <input type="file" id="resume-file-input" accept="application/pdf" style="display:none">
            <button type="button" class="dash-btn" id="choose-resume-btn">Choose PDF</button>
            <a href="resume.pdf" target="_blank" class="mono contact-link">current: resume.pdf ↗</a>
          </div>
        </div>
        <div class="dash-actions">
          <button type="button" class="dash-btn dash-btn-primary" id="save-resume-btn" disabled>Save &amp; publish</button>
        </div>
        <div class="mono dash-status" id="resume-status"></div>
      </section>
    </main>
  </div>

  <script src="dashboard.js"></script>
  <script src="theme.js" defer></script>
</body>
</html>
